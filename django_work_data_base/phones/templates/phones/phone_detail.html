<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ phone.name }}</title>
</head>
<body>
<h1>{{ phone.name }}</h1>

<img src="{{ phone.image }}" alt="{{ phone.name }}" width="300">

<p>Цена: {{ phone.price }}</p>
<p>Дата выхода: {{ phone.release_date }}</p>

<p>
    LTE:
    {% if phone.lte_exists %}
    есть
    {% else %}
    нет
    {% endif %}
</p>

<p>
    <a href="{% url 'catalog' %}">Вернуться в каталог</a>
</p>
</body>
</html>
